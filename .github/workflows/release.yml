name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write   # needed for ghcr.io push

env:
  APP_VERSION: ${{ inputs.tag || github.ref_name }}

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download YOLO model
        run: python -c "from ultralytics import YOLO; YOLO('yolo12s.pt')"

      - name: Build .app bundle
        run: APP_VERSION=${{ env.APP_VERSION }} pyinstaller speedometer.spec --noconfirm

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Speedometer" \
            -srcfolder "dist/Speedometer.app" \
            -ov -format UDZO \
            "Speedometer-${{ env.APP_VERSION }}-mac.dmg"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          files: "Speedometer-${{ env.APP_VERSION }}-mac.dmg"

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download YOLO model
        run: python -c "from ultralytics import YOLO; YOLO('yolo12s.pt')"

      - name: Build executable folder
        run: pyinstaller speedometer.spec --noconfirm

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create installer
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" build/installer.nsi

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          files: "Speedometer-${{ env.APP_VERSION }}-windows-setup.exe"

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux tarball
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps for OpenCV
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download YOLO model
        run: python -c "from ultralytics import YOLO; YOLO('yolo12s.pt')"

      - name: Build executable folder
        run: pyinstaller speedometer.spec --noconfirm

      - name: Add run script
        run: |
          cat > dist/Speedometer/run.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          "$DIR/Speedometer" "$@"
          EOF
          chmod +x dist/Speedometer/run.sh

      - name: Create tarball
        run: |
          tar -czf "Speedometer-${{ env.APP_VERSION }}-linux.tar.gz" \
            -C dist Speedometer

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          files: "Speedometer-${{ env.APP_VERSION }}-linux.tar.gz"

  # ── Docker ─────────────────────────────────────────────────────────────────
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
